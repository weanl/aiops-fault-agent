case_id: case-03
case_name: 证据不足 / 多候选冲突
time_window: 最近 30 分钟（16:00-16:30）
scenario: CBS 用户充值失败
expected_verify: 证据不足以支撑任何高置信候选根因时，9B 能否输出 INSUFFICIENT_EVIDENCE 而不强行下结论

evidence:
  - label: Evidence A
    type: Alarm
    description: 时间窗口内的告警快照（已从告警系统查询完成）。
    columns: [告警ID, 时间, 对象, 类型, 等级]
    rows:
      - {告警ID: "ALM-2026-0628-201", 时间: "16:12", 对象: "CBS-SH-01", 类型: "充值错误率轻微波动", 等级: "P3"}
      - {告警ID: "ALM-2026-0628-202", 时间: "16:18", 对象: "OCS-BJ-02", 类型: "充值错误率轻微波动", 等级: "P3"}
      - {告警ID: "ALM-2026-0628-203", 时间: "16:24", 对象: "Adapter-PAY-01", 类型: "第三方支付响应时间波动", 等级: "P3"}
    notes: |
      三条告警均为 P3（轻微），无 P0/P1/P2 告警
      告警时间分散在 12 分钟内，无明显先后关系

  - label: Evidence B
    type: KPI
    description: 相关网元的 KPI 快照（已从监控系统查询完成）。
    columns: [对象, 指标, 数值, 单位, 时间]
    rows:
      - {对象: "CBS-SH-01", 指标: "充值成功率", 数值: 96.8, 单位: "%", 时间: "16:30"}
      - {对象: "OCS-BJ-02", 指标: "连接池使用率", 数值: 72.0, 单位: "%", 时间: "16:30"}
      - {对象: "OCS-BJ-02", 指标: "平均响应时间", 数值: 110, 单位: "ms", 时间: "16:30"}
      - {对象: "OCS-BJ-02", 指标: "错误率", 数值: 1.2, 单位: "%", 时间: "16:30"}
      - {对象: "Adapter-PAY-01", 指标: "第三方支付成功率", 数值: 97.5, 单位: "%", 时间: "16:30"}
      - {对象: "Adapter-PAY-01", 指标: "平均响应时间", 数值: 380, 单位: "ms", 时间: "16:30"}
    notes: |
      所有对象指标均在历史正常范围内波动
      CBS-SH-01 充值成功率 96.8%，略低于 99% 基线但未触发告警阈值
      OCS-BJ-02 连接池使用率 72%，低于 85% P2 阈值
      Adapter-PAY-01 平均响应时间 380ms，接近基线 320ms

  - label: Evidence C
    type: Topology
    description: 相关网元的拓扑关系（已从 CMDB 查询完成）。
    graph: |
      CBS-SH-01 (充值入口) → OCS-BJ-02 (在线计费) → Adapter-PAY-01 (第三方支付)
    objects:
      - {id: "CBS-SH-01", role: "充值入口网关"}
      - {id: "OCS-BJ-02", role: "在线计费系统（北京节点）"}
      - {id: "Adapter-PAY-01", role: "第三方支付适配器"}
    notes: |
      充值请求路径：CBS-SH-01 → OCS-BJ-02 → Adapter-PAY-01
      拓扑关系正常

  - label: Evidence D
    type: Error Statistics
    description: 错误码分布统计（已从日志系统查询完成）。
    columns: [错误码, 次数, 占比, 主要对象]
    rows:
      - {错误码: "5004", 次数: 85, 占比: 28.5, 主要对象: "OCS-BJ-02"}
      - {错误码: "5005", 次数: 42, 占比: 14.1, 主要对象: "OCS-BJ-02"}
      - {错误码: "7001", 次数: 78, 占比: 26.2, 主要对象: "Adapter-PAY-01"}
      - {错误码: "7002", 次数: 93, 占比: 31.2, 主要对象: "Adapter-PAY-01"}
    notes: |
      错误码 5004：连接池获取超时
      错误码 5005：数据库写入超时
      错误码 7001：第三方支付网关响应超时
      错误码 7002：第三方支付网关拒绝
      四种错误码分散在 OCS-BJ-02 和 Adapter-PAY-01 两个对象
      没有任何一个错误码或对象占据主导（占比均低于 35%）
      无法从错误码分布直接判定根因对象