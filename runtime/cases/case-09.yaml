case_id: case-09
case_name: Evidence 时间线冲突
time_window: 最近 30 分钟（22:00-22:30）
scenario: CBS 用户充值失败
expected_verify: 验证 9B 能识别时间线冲突并降低置信度；时间顺序不闭合时不得输出 high confidence

evidence:
  - label: Evidence A
    type: Alarm
    description: 时间窗口内的告警快照（已从告警系统查询完成）。
    columns: [告警ID, 时间, 对象, 类型, 等级]
    rows:
      - {告警ID: "ALM-2026-0630-901", 时间: "22:05", 对象: "OCS-BJ-02", 类型: "连接池使用率超阈值", 等级: "P2"}
      - {告警ID: "ALM-2026-0630-902", 时间: "22:25", 对象: "CBS-SH-01", 类型: "充值成功率下降", 等级: "P3"}
    notes: |
      告警时间线：
      - 22:05：OCS-BJ-02 P2 告警（连接池超阈值）—— 最早
      - 22:25：CBS-SH-01 P3 告警（成功率下降）—— 最晚（晚 20 分钟）

  - label: Evidence B
    type: KPI
    description: 相关网元的 KPI 快照（已从监控系统查询完成）。
    columns: [对象, 指标, 数值, 单位, 时间]
    rows:
      - {对象: "OCS-BJ-02", 指标: "连接池使用率", 数值: 89.0, 单位: "%", 时间: "22:30"}
      - {对象: "OCS-BJ-02", 指标: "平均响应时间", 数值: 250, 单位: "ms", 时间: "22:30"}
      - {对象: "OCS-BJ-02", 指标: "错误率", 数值: 3.2, 单位: "%", 时间: "22:30"}
      - {对象: "CBS-SH-01", 指标: "充值成功率", 数值: 92.0, 单位: "%", 时间: "22:30"}
    notes: |
      OCS-BJ-02 KPI 起点：连接池 89%（已超 P2 阈值 85%）
      CBS-SH-01 成功率 92%（基线 99%）

  - label: Evidence C
    type: Topology
    description: 相关网元的拓扑关系（已从 CMDB 查询完成）。
    graph: |
      CBS-SH-01 (充值入口) → OCS-BJ-02 (在线计费) → Adapter-PAY-01 (第三方支付)
    objects:
      - {id: "CBS-SH-01", role: "充值入口网关"}
      - {id: "OCS-BJ-02", role: "在线计费系统（北京节点）"}
      - {id: "Adapter-PAY-01", role: "第三方支付适配器"}
    notes: |
      拓扑关系正常

  - label: Evidence D
    type: Error Statistics
    description: 错误码分布统计（已从日志系统查询完成）。
    columns: [错误码, 次数, 占比, 主要对象]
    rows:
      - {错误码: "5004", 次数: 150, 占比: 75.0, 主要对象: "OCS-BJ-02"}
      - {错误码: "8001", 次数: 50, 占比: 25.0, 主要对象: "CBS-SH-01"}
    notes: |
      错误码时间线（缺失项）：
      **Evidence D 没有提供错误码首次出现时间**——只能从占比推断
      已知信息：
      - 5004 集中在 OCS-BJ-02（75%）—— OCS 错误码
      - 8001 集中在 CBS-SH-01（25%）—— CBS 错误码
      时间线冲突分析：
      - 22:05 OCS 告警 → 假设 5004 在 22:05 前已存在
      - 22:25 CBS 告警 → 假设 8001 在 22:25 前已存在
      - **但 22:25 CBS 告警时（成功率下降），OCS 已在 22:05 异常**
      - 正常因果链：OCS 异常 → CBS 异常（OK）
      - 反向因果链：CBS 异常 → OCS 异常（与拓扑不符）
      真正的冲突点：5004 错误码 75% 集中在 OCS，但 CBS 告警在 OCS 告警之后 20 分钟才发生——延迟较长，需要更多时间线数据验证
      缺失证据：错误码首次出现时间、KPI 异常起点时间
