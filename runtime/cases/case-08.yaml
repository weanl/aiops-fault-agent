    notes: |
      仅 1 条 P3 告警（CBS 入口，**非 OCS**）
      **历史案例典型场景：OCS-BJ-02 连接池耗尽**（case-01）
      本 Case 告警对象是 CBS-SH-01，**与历史案例对象不同**

  - label: Evidence B
    type: KPI
    description: 相关网元的 KPI 快照（已从监控系统查询完成）。
    columns: [对象, 指标, 数值, 单位, 时间]
    rows:
