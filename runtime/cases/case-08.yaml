case_id: case-08
case_name: 历史案例相似但当前证据不支持
time_window: 最近 30 分钟（21:00-21:30）
scenario: CBS 用户充值失败
expected_verify: 验证历史案例不能直接决定当前根因——当前证据不支持时必须降置信或 INSUFFICIENT_EVIDENCE

evidence:
