      - {对象: "OCS-BJ-02", 指标: "连接池使用率", 数值: 68.0, 单位: "%", 时间: "21:30"}
      - {对象: "OCS-BJ-02", 指标: "平均响应时间", 数值: 105, 单位: "ms", 时间: "21:30"}
      - {对象: "OCS-BJ-02", 指标: "错误率", 数值: 0.4, 单位: "%", 时间: "21:30"}
      - {对象: "Adapter-PAY-01", 指标: "第三方支付成功率", 数值: 98.5, 单位: "%", 时间: "21:30"}
    notes: |
      所有 KPI 在基线范围内：
      OCS 连接池 68%（基线 65%）
      OCS 错误率 0.4%（基线 0.5%）
      Adapter 成功率 98.5%（基线 99%）
      CBS 成功率 97.8%（接近基线 99%）
      **与历史案例（OCS 连接池 98.5%）完全不同**

  - label: Evidence C
    type: Topology
    description: 相关网元的拓扑关系（已从 CMDB 查询完成）。
    graph: |
      CBS-SH-01 (充值入口) → OCS-BJ-02 (在线计费) → Adapter-PAY-01 (第三方支付)
    objects:
      - {id: "CBS-SH-01", role: "充值入口网关"}
      - {id: "OCS-BJ-02", role: "在线计费系统（北京节点）"}
      - {id: "Adapter-PAY-01", role: "第三方支付适配器"}
    notes: |
      拓扑关系正常

  - label: Evidence D
    type: Error Statistics
    description: 错误码分布统计（已从日志系统查询完成）。
    columns: [错误码, 次数, 占比, 主要对象]
    rows:
      - {错误码: "8001", 次数: 35, 占比: 70.0, 主要对象: "CBS-SH-01"}
      - {错误码: "5004", 次数: 8, 占比: 16.0, 主要对象: "OCS-BJ-02"}
      - {错误码: "7001", 次数: 7, 占比: 14.0, 主要对象: "Adapter-PAY-01"}
    notes: |
      错误码 8001：充值请求超时（CBS 专属）
      错误码 5004：连接池获取超时（OCS 专属）—— **仅 8 次**
      错误码 7001：第三方支付响应超时（Adapter 专属）—— **仅 7 次**
      关键差异：
      - 历史案例（case-01）：5004 占 95.2%（4280 次）→ OCS 连接池耗尽
      - 本 Case：5004 仅占 16.0%（8 次）→ **不是 OCS 连接池耗尽**
      本 Case 主要错误码 8001（CBS），但量极少（35 次）
