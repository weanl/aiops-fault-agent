case_id: case-05
case_name: 告警先发生但 KPI 未异常
time_window: 最近 30 分钟（18:00-18:30）
scenario: CBS 用户充值失败
expected_verify: P1/P2 告警触发但所有 KPI 指标均在基线内，验证不能只凭告警定根因

evidence:
  - label: Evidence A
    type: Alarm
    description: 时间窗口内的告警快照（已从告警系统查询完成）。
    columns: [告警ID, 时间, 对象, 类型, 等级]
    rows:
      - {告警ID: "ALM-2026-0630-501", 时间: "18:05", 对象: "OCS-BJ-02", 类型: "连接池使用率超阈值", 等级: "P2"}
      - {告警ID: "ALM-2026-0630-502", 时间: "18:12", 对象: "OCS-BJ-02", 类型: "连接池使用率持续超阈值", 等级: "P2"}
    notes: |
      两条 P2 告警集中在 OCS-BJ-02
      告警时间 18:05 + 18:12

  - label: Evidence B
    type: KPI
    description: 相关网元的 KPI 快照（已从监控系统查询完成）。
    columns: [对象, 指标, 数值, 单位, 时间]
    rows:
      - {对象: "OCS-BJ-02", 指标: "连接池使用率", 数值: 76.0, 单位: "%", 时间: "18:30"}
      - {对象: "OCS-BJ-02", 指标: "充值 TPS", 数值: 280, 单位: "req/s", 时间: "18:30"}
      - {对象: "OCS-BJ-02", 指标: "平均响应时间", 数值: 95, 单位: "ms", 时间: "18:30"}
      - {对象: "OCS-BJ-02", 指标: "错误率", 数值: 0.3, 单位: "%", 时间: "18:30"}
      - {对象: "CBS-SH-01", 指标: "充值成功率", 数值: 99.4, 单位: "%", 时间: "18:30"}
    notes: |
      **KPI 全在基线内**：
      连接池使用率 76%（基线 65%，P2 阈值 85%）—— 告警阈值触发但未达到 P1
      错误率 0.3%（基线 0.5%）—— 低于基线
      充值成功率 99.4% —— 优秀
      告警可能由临时峰值触发（18:00-18:12），但 KPI 未持续异常

  - label: Evidence C
    type: Topology
    description: 相关网元的拓扑关系（已从 CMDB 查询完成）。
    graph: |
      CBS-SH-01 (充值入口) → OCS-BJ-02 (在线计费) → Adapter-PAY-01 (第三方支付)
    objects:
      - {id: "CBS-SH-01", role: "充值入口网关"}
      - {id: "OCS-BJ-02", role: "在线计费系统（北京节点）"}
      - {id: "Adapter-PAY-01", role: "第三方支付适配器"}
    notes: |
      拓扑关系正常

  - label: Evidence D
    type: Error Statistics
    description: 错误码分布统计（已从日志系统查询完成）。
    columns: [错误码, 次数, 占比, 主要对象]
    rows:
      - {错误码: "5004", 次数: 5, 占比: 35.7, 主要对象: "OCS-BJ-02"}
      - {错误码: "5005", 次数: 3, 占比: 21.4, 主要对象: "OCS-BJ-02"}
      - {错误码: "0000", 次数: 6, 占比: 42.9, 主要对象: "OCS-BJ-02"}
    notes: |
      错误码 5004：连接池获取超时（仅 5 次）
      错误码 5005：数据库写入超时（仅 3 次）
      错误码 0000：成功请求（6 次）
      **错误码总量极少（14 次）**，远低于 Case 1 的 4495 次
      错误码分布不构成"主要错误"

