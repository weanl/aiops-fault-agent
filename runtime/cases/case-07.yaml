case_id: case-07
case_name: 多个对象同时异常（对象归因不漂移）
time_window: 最近 30 分钟（20:00-20:30）
scenario: CBS 用户充值失败
expected_verify: 多对象同时异常时，验证对象归因不漂移；不能只因 OCS 有告警就强归 OCS

evidence:
  - label: Evidence A
    type: Alarm
    description: 时间窗口内的告警快照（已从告警系统查询完成）。
    columns: [告警ID, 时间, 对象, 类型, 等级]
    rows:
      - {告警ID: "ALM-2026-0630-701", 时间: "20:08", 对象: "OCS-BJ-02", 类型: "连接池使用率超阈值", 等级: "P2"}
      - {告警ID: "ALM-2026-0630-702", 时间: "20:14", 对象: "Adapter-PAY-01", 类型: "第三方支付成功率下降", 等级: "P2"}
      - {告警ID: "ALM-2026-0630-703", 时间: "20:22", 对象: "CBS-SH-01", 类型: "充值成功率下降", 等级: "P2"}
    notes: |
      三个对象同时触发 P2 告警
      时间顺序：OCS-BJ-02 (20:08) → Adapter-PAY-01 (20:14) → CBS-SH-01 (20:22)
      OCS 告警时间最早（6 min before Adapter），CBS 最晚
      **不能仅凭 OCS 告警时间最早就强判 OCS 是根因**——可能是上游级联

  - label: Evidence B
    type: KPI
    description: 相关网元的 KPI 快照（已从监控系统查询完成）。
    columns: [对象, 指标, 数值, 单位, 时间]
    rows:
      - {对象: "OCS-BJ-02", 指标: "连接池使用率", 数值: 88.0, 单位: "%", 时间: "20:30"}
      - {对象: "OCS-BJ-02", 指标: "平均响应时间", 数值: 320, 单位: "ms", 时间: "20:30"}
      - {对象: "OCS-BJ-02", 指标: "错误率", 数值: 5.2, 单位: "%", 时间: "20:30"}
      - {对象: "Adapter-PAY-01", 指标: "第三方支付成功率", 数值: 72.0, 单位: "%", 时间: "20:30"}
      - {对象: "Adapter-PAY-01", 指标: "平均响应时间", 数值: 1800, 单位: "ms", 时间: "20:30"}
      - {对象: "CBS-SH-01", 指标: "充值成功率", 数值: 85.0, 单位: "%", 时间: "20:30"}
    notes: |
      三个对象 KPI 全部异常：
      OCS-BJ-02: 连接池 88%（接近 P2 阈值 85%）
      Adapter-PAY-01: 成功率 72%（基线 99%）、响应时间 1800ms
      CBS-SH-01: 充值成功率 85%
      KPI 起点对比：
      - OCS 错误率起点 5.2%（中等异常）
      - Adapter 成功率 72%（严重异常）
      - CBS 成功率 85%（中等异常）
      Adapter KPI 恶化程度最严重，但 OCS 告警时间最早——**判断哪个是源头需结合错误码集中度**

  - label: Evidence C
    type: Topology
    description: 相关网元的拓扑关系（已从 CMDB 查询完成）。
    graph: |
      CBS-SH-01 (充值入口) → OCS-BJ-02 (在线计费) → Adapter-PAY-01 (第三方支付)
    objects:
      - {id: "CBS-SH-01", role: "充值入口网关"}
      - {id: "OCS-BJ-02", role: "在线计费系统（北京节点）"}
      - {id: "Adapter-PAY-01", role: "第三方支付适配器"}
    notes: |
      拓扑：CBS → OCS → Adapter（请求路径）
      Adapter 在 OCS 下游，Adapter 异常可能反向影响 OCS
      CBS 在 OCS 上游，CBS 异常可能是 OCS 异常的下游表现
      **不能仅按告警时间顺序判断根因对象**

  - label: Evidence D
    type: Error Statistics
    description: 错误码分布统计（已从日志系统查询完成）。
    columns: [错误码, 次数, 占比, 主要对象]
    rows:
      - {错误码: "5004", 次数: 380, 占比: 45.2, 主要对象: "OCS-BJ-02"}
      - {错误码: "7001", 次数: 320, 占比: 38.1, 主要对象: "Adapter-PAY-01"}
      - {错误码: "8001", 次数: 140, 占比: 16.7, 主要对象: "CBS-SH-01"}
    notes: |
      错误码 5004：连接池获取超时（OCS 专属）
      错误码 7001：第三方支付网关响应超时（Adapter 专属）
      错误码 8001：充值请求超时（CBS 专属）
      错误码分布特征：
      - 5004 (45.2%)：OCS 连接池，但未达 70% 集中度
      - 7001 (38.1%)：Adapter 支付网关，接近 OCS 占比
      - 8001 (16.7%)：CBS 入口超时，可能级联
      **没有任何错误码占比 > 70%**——需结合多维度判断
      缺失证据：未提供错误码首次出现时间，无法判断级联方向
